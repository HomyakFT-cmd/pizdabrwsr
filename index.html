<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Браузер ПИЗДА</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c1b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .search-container {
            text-align: center;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.5s ease;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(127, 0, 255, 0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(255, 0, 127, 0.8)); }
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2), inset 0 0 10px rgba(255, 0, 127, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        .result-screen {
            display: none;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.2;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            word-wrap: break-word;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .lox-text {
            font-size: 5rem;
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333, 0 0 40px #ff0000;
            letter-spacing: 10px;
        }

        .dima-text {
            font-size: 3rem;
            color: #ff3399;
            text-shadow: 0 0 15px #ff3399;
        }

        .floniz-text {
            font-size: 3.5rem;
            color: #ff9900;
            text-shadow: 0 0 20px #ff9900, 0 0 40px #ff5500;
        }

        .congrats-text {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 4s linear infinite, pulse 1.5s ease-in-out infinite alternate;
        }

        .emojis {
            font-size: 4rem;
            margin-top: 20px;
            display: block;
            animation: bounce 1s infinite alternate;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            from { transform: scale(0.98); filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
            to { transform: scale(1.02); filter: drop-shadow(0 0 25px rgba(255,255,255,0.6)); }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .normal-text {
            font-size: 2rem;
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
        }

        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #7f00ff;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-btn {
            display: none;
            margin-top: 40px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="search-container" id="mainContainer">
        <div class="logo" id="logo">Пизда</div>
        
        <!-- Форма возвращена, но отправка обрабатывается через JavaScript -->
        <form id="searchForm" onsubmit="executeSearch(event)">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Введите запрос..." autocomplete="off" required>
                <button type="submit" class="search-btn">Поиск</button>
            </div>
        </form>

        <div class="loader" id="loader"></div>
        <div class="result-screen" id="resultScreen"></div>
        <button class="back-btn" id="backBtn" onclick="resetBrowser()">Назад</button>
    </div>

    <script>
        let fireworkInterval = null;
        const searchInput = document.getElementById('searchInput');

        function executeSearch(event) {
            // Полная блокировка перезагрузки страницы браузером
            if (event) event.preventDefault();

            const val = searchInput.value;
            if (!val || val.trim() === '') return;

            const query = val.trim().toLowerCase();
            
            const form = document.getElementById('searchForm');
            const logo = document.getElementById('logo');
            const loader = document.getElementById('loader');
            const resultScreen = document.getElementById('resultScreen');
            const backBtn = document.getElementById('backBtn');

            form.style.display = 'none';
            logo.style.display = 'none';
            loader.style.display = 'block';

            setTimeout(() => {
                loader.style.display = 'none';
                resultScreen.style.display = 'block';
                backBtn.style.display = 'inline-block';

                if (query === 'пизда') {
                    resultScreen.innerHTML = '<span class="lox-text">ЛОХ</span>';
                } 
                else if (query === 'дима лох') {
                    resultScreen.innerHTML = '<span class="dima-text">Ты сын ебанной жирной бляди❤️</span>';
                } 
                else if (query === 'флониз') {
                    resultScreen.innerHTML = '<span class="floniz-text">тупорылый уродец</span>';
                    startFireworks();
                } 
                else if (query === 'конец') {
                    resultScreen.innerHTML = '<span class="congrats-text">ПОЗДРАВЛЯЮ ВЫ ПРОШЛИ ПИЗДУ</span><span class="emojis">🎉🥳🔥✨👑💎</span>';
                    startFireworks();
                } 
                else {
                    resultScreen.innerHTML = `<span class="normal-text">Искать "${val}" в браузере Пизда?</span>`;
                }
            }, 600);
        }

        function resetBrowser() {
            document.getElementById('searchForm').style.display = 'block';
            document.getElementById('logo').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            searchInput.value = '';
            searchInput.focus();
            stopFireworks();
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let animationFrameId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;this.velocity = {x: (Math.random() - 0.5) * 8,y: (Math.random() - 0.5) * 8};this.alpha = 1;this.friction = 0.98;this.gravity = 0.05;}draw() {ctx.save();ctx.globalAlpha = this.alpha;ctx.beginPath();ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);ctx.fillStyle = this.color;ctx.shadowBlur = 10;ctx.shadowColor = this.color;ctx.fill();ctx.restore();}update() {this.velocity.x *= this.friction;this.velocity.y *= this.friction;this.velocity.y += this.gravity;this.x += this.velocity.x;this.y += this.velocity.y;this.alpha -= 0.015;}}function createFirework(x, y) {const colors = ['#ff007f', '#7f00ff', '#00ffff', '#ff9900', '#00ff00', '#ffff00'];const color = colors[Math.floor(Math.random() * colors.length)];for (let i = 0; i < 40; i++) {particles.push(new Particle(x, y, color));}}function animateFireworks() {animationFrameId = requestAnimationFrame(animateFireworks);ctx.clearRect(0, 0, canvas.width, canvas.height);particles.forEach((particle, index) => {if (particle.alpha > 0) {particle.update();particle.draw();} else {particles.splice(index, 1);}});}function startFireworks() {stopFireworks();animateFireworks();fireworkInterval = setInterval(() => {const randomX = Math.random() * canvas.width;const randomY = Math.random() * (canvas.height * 0.6);createFirework(randomX, randomY);}, 400);}function stopFireworks() {clearInterval(fireworkInterval);cancelAnimationFrame(animationFrameId);particles = [];ctx.clearRect(0, 0, canvas.width, canvas.height);}
